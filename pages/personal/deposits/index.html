<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>存款服務 | 富邦銀行</title>
  <link rel="stylesheet" href="../../../css/main.css">
  <style>
    .page-header { position: relative; padding: var(--spacing-15) 0 var(--spacing-10); background: linear-gradient(135deg, #34C759 0%, #30D158 100%); color: var(--white); text-align: center; overflow: hidden; }
    .page-header-bg { position: absolute; inset: 0; opacity: 0.15; }
    .page-header-bg img { width: 100%; height: 100%; object-fit: cover; }
    .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--spacing-8); padding: var(--spacing-12) 0; }
    .product-card { background: var(--white); border-radius: var(--radius-2xl); padding: var(--spacing-10); box-shadow: var(--shadow-md); }
    .product-icon { width: 64px; height: 64px; border-radius: var(--radius-xl); background: linear-gradient(135deg, #34C759 0%, #30D158 100%); display: flex; align-items: center; justify-content: center; font-size: 32px; margin-bottom: var(--spacing-6); }
    .product-title { font-size: var(--font-title-3); font-weight: var(--font-weight-bold); margin-bottom: var(--spacing-3); }
    .product-rate { font-size: 42px; font-weight: var(--font-weight-bold); color: var(--success); line-height: 1; margin: var(--spacing-4) 0; }
    .product-rate span { font-size: var(--font-body); color: var(--gray-primary); }
    @media (max-width: 734px) { .product-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-content">
      <a href="../../../../" class="navbar-logo">
        <img src="../../../../images/logo/fubon-logo.svg" alt="富邦銀行" height="40">
        <span>富邦銀行</span>
      </a>
      <div class="navbar-menu">
        <a href="../../../" class="navbar-link" class="navbar-link active">個人銀行</a>
        <a href="../../commercial/" class="navbar-link">商業銀行</a>
        <a href="../../wealth/" class="navbar-link">財富管理</a>
        <a href="../../ebanking/" class="navbar-link">電子銀行</a>
        <a href="../../about/" class="navbar-link">關於我們</a>
      </div>
      <div class="navbar-actions">
        <a href="#" class="btn btn-primary btn-small">網上銀行</a>
        <button class="navbar-toggle"><span></span><span></span><span></span></button>
      </div>
    </div>
  </nav>

  <header class="page-header">
    <div class="page-header-bg">
      <img src="../../../../images/products/savings.jpg" alt="存款服務" loading="lazy">
    </div>
    <div class="container">
      <h1 class="page-title">存款服務</h1>
      <p class="page-subtitle">靈活存款方案，讓您的資金穩步增值</p>
    </div>
  </header>

  <section class="section">
    <div class="container">
      <div class="product-grid">
        <div class="product-card">
          <div class="product-icon">💰</div>
          <h2 class="product-title">活期存款</h2>
          <p style="color:var(--gray-primary);margin-bottom:var(--spacing-6)">隨時存取，靈活方便，適合日常資金管理</p>
          <div class="product-rate">0.01%<span>年利率</span></div>
          <a href="#" class="btn btn-primary">立即開戶</a>
        </div>
        <div class="product-card">
          <div class="product-icon">📅</div>
          <h2 class="product-title">定期存款</h2>
          <p style="color:var(--gray-primary);margin-bottom:var(--spacing-6)">固定期限，優惠利率，資金穩健增值</p>
          <div class="product-rate">3.5%<span>年利率</span></div>
          <a href="#" class="btn btn-primary">立即存放</a>
        </div>
        <div class="product-card">
          <div class="product-icon">¥</div>
          <h2 class="product-title">人民幣存款</h2>
          <p style="color:var(--gray-primary);margin-bottom:var(--spacing-6">把握人民幣業務機遇，賺取更高回報</p>
          <div class="product-rate">2.8%<span>年利率</span></div>
          <a href="#" class="btn btn-primary">立即開戶</a>
        </div>
        <div class="product-card">
          <div class="product-icon">🌏</div>
          <h2 class="product-title">外幣存款</h2>
          <p style="color:var(--gray-primary);margin-bottom:var(--spacing-6">多種貨幣選擇，分散匯率風險</p>
          <div class="product-rate">4.2%<span>年利率</span></div>
          <a href="#" class="btn btn-primary">立即存放</a>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p class="footer-copyright">© 2026 富邦銀行 (香港) 有限公司 版權所有</p>
      </div>
    </div>
  </footer>
  <script src="../../../../js/main.js"></script>
</body>
</html>
