<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60">
  <!-- Fubon Bank Logo -->
  <defs>
    <linearGradient id="fubonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F47920;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Logo Icon -->
  <g transform="translate(10, 5)">
    <!-- Circle background -->
    <circle cx="25" cy="25" r="25" fill="url(#fubonGrad)"/>
    
    <!-- Chinese character stylized -->
    <text x="25" y="32" text-anchor="middle" fill="white" font-size="28" font-weight="bold" font-family="Arial, sans-serif">富</text>
  </g>
  
  <!-- Logo Text -->
  <text x="70" y="35" fill="#1D1D1F" font-size="24" font-weight="bold" font-family="Arial, sans-serif">富邦銀行</text>
  <text x="70" y="50" fill="#86868B" font-size="12" font-family="Arial, sans-serif">FUBON BANK</text>
</svg>
